name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Fast gate: every mode renders and key files exist; hybrid slug is substituted.
  render:
    name: render (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [web, mobile, desktop, hybrid, core]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      - name: Render and assert
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          uvx copier copy --defaults --trust --vcs-ref HEAD \
            --data project_type=${{ matrix.preset }} \
            --data project_name="CI ${{ matrix.preset }}" . "$out"
          test -f "$out/AGENTS.md" || { echo "AGENTS.md missing"; exit 1; }
          test -f "$out/docs/GATES.md" || { echo "docs/GATES.md missing"; exit 1; }
          test -f "$out/.copier-answers.yml" || { echo "answers file missing"; exit 1; }
          if [ "${{ matrix.preset }}" = "hybrid" ]; then
            if grep -rq "PROJECT_SLUG_PLACEHOLDER" "$out"; then echo "slug placeholder not replaced"; exit 1; fi
          fi
          echo "rendered ${{ matrix.preset }} OK"

  # Build gate: web preset must install, typecheck, lint, and build.
  build-web:
    name: build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      - name: Render web
        run: |
          set -euo pipefail
          echo "OUT=$(mktemp -d)" >> "$GITHUB_ENV"
      - run: uvx copier copy --defaults --trust --skip-tasks --vcs-ref HEAD --data project_type=web --data project_name="CI Web" . "$OUT"
      - name: install + verify
        working-directory: ${{ env.OUT }}/web
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run lint
          npm run build

  # Build gate: mobile must install and typecheck; native binary build is EAS.
  build-mobile:
    name: build mobile (typecheck + web export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      - run: echo "OUT=$(mktemp -d)" >> "$GITHUB_ENV"
      - run: uvx copier copy --defaults --trust --skip-tasks --vcs-ref HEAD --data project_type=mobile --data project_name="CI Mobile" . "$OUT"
      - name: install + typecheck
        working-directory: ${{ env.OUT }}/mobile
        run: |
          set -euo pipefail
          npm ci
          npx tsc --noEmit

  # Build gate: hybrid must install (pnpm) and typecheck across the workspace.
  build-hybrid:
    name: build hybrid (pnpm typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: corepack enable
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      - run: echo "OUT=$(mktemp -d)" >> "$GITHUB_ENV"
      # --trust runs the slug-substitution task so pnpm can resolve workspace links.
      - run: uvx copier copy --defaults --trust --vcs-ref HEAD --data project_type=hybrid --data project_name="CI Hybrid" . "$OUT"
      - name: install + typecheck
        working-directory: ${{ env.OUT }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm -r run type-check

  # Build gate: desktop frontend builds and typechecks, then the full Tauri build.
  build-desktop:
    name: build desktop (frontend + tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: System deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      # Stable render path (not mktemp) so rust-cache can key on a fixed workspace.
      - run: echo "OUT=$RUNNER_TEMP/ci-desktop" >> "$GITHUB_ENV"
      - run: uvx copier copy --defaults --trust --skip-tasks --vcs-ref HEAD --data project_type=desktop --data project_name="CI Desktop" . "$OUT"
      # Cache the Rust target keyed on the committed Cargo.lock, so the Tauri build
      # (the CI long pole) reuses compiled crates across runs. Runs after render so
      # Cargo.lock exists for the cache key.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ runner.temp }}/ci-desktop/desktop/src-tauri -> target
      - name: install + frontend verify
        working-directory: ${{ env.OUT }}/desktop
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run lint
          npm run build
      - name: tauri build
        working-directory: ${{ env.OUT }}/desktop
        run: npm run tauri build -- --no-bundle

  # The moat, enforced. copier update must propagate governance across EVERY
  # prior version and EVERY scaffold (web/mobile/desktop/hybrid/core) without
  # clobbering user-owned files. Scaffolds at each released tag, updates to this
  # PR's HEAD, and asserts: update succeeds; a new governance file (SECURITY.md)
  # propagates IN; a removed governance line (GEMINI.md, dropped in v0.2) is gone;
  # and a user edit to a _skip_if_exists file (CHARTER.md) is never clobbered.
  update-matrix:
    name: update ${{ matrix.from }} -> HEAD (${{ matrix.scaffold }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        from: [v0.1.0, v0.2.0, v0.3.0]
        scaffold: [web, mobile, desktop, hybrid, core]
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: |
          git config --global user.email ci@groundwork.local
          git config --global user.name "groundwork CI"
          # Stop background git gc/maintenance from racing copier's temp-dir
          # cleanup (intermittent OSError [Errno 39] Directory not empty: '.git').
          git config --global gc.auto 0
          git config --global maintenance.auto false
      - name: scaffold at ${{ matrix.from }}, edit a user file, update to this PR, assert
        run: |
          set -euo pipefail
          proj="$(mktemp -d)"
          uvx copier copy --defaults --trust --vcs-ref ${{ matrix.from }} \
            --data project_type=${{ matrix.scaffold }} --data project_name="UT" \
            gh:SynSe7en7/groundwork "$proj"
          cd "$proj"
          git rev-parse --git-dir >/dev/null 2>&1 || git init -q
          # Seed a user edit in a user-owned (_skip_if_exists) file.
          test -f CHARTER.md && echo "USER-SENTINEL-DO-NOT-CLOBBER" >> CHARTER.md
          git add -A && git commit -q -m "baseline + user edit" --allow-empty
          # Update to this PR's branch HEAD.
          uvx copier update --defaults --trust --vcs-ref "${{ github.head_ref }}"
          # (1) a new governance file propagated IN from HEAD
          test -f SECURITY.md || { echo "FAIL: SECURITY.md did not propagate from HEAD"; exit 1; }
          # (2) a removed governance line is gone (a real removal from a v0.1 baseline)
          if [ -f .gemini/settings.json ] && grep -q "GEMINI.md" .gemini/settings.json; then
            echo "FAIL: GEMINI.md removal did not propagate"; exit 1
          fi
          # (3) a user-owned file is never clobbered
          if [ -f CHARTER.md ] && ! grep -q "USER-SENTINEL-DO-NOT-CLOBBER" CHARTER.md; then
            echo "FAIL: copier update clobbered a user-owned file (CHARTER.md)"; exit 1
          fi
          echo "OK: ${{ matrix.from }} -> HEAD (${{ matrix.scaffold }}) propagated cleanly"

  lint-skills-loops:
    name: skills, loops, and ADRs are well-formed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python3 scripts/lint_skills_loops.py
      - run: python3 scripts/check_adrs.py

  # The create-groundwork wrapper must survive macOS's system bash (3.2), where an
  # empty array under `set -u` is an unbound-variable error. Linux CI runs bash 5
  # and masks it, so run the smoke test inside a bash:3.2 container.
  wrapper-bash32:
    name: create-groundwork wrapper (bash 3.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Smoke-test the wrapper under bash 3.2
        run: docker run --rm -v "$PWD:/w" -w /w bash:3.2 bash scripts/test-create-groundwork.sh

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run gitleaks (pinned binary, no license required)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --redact --no-banner

  # Content drift gate: re-render each scaffold and diff its content against the
  # committed golden manifest (tests/golden/*.manifest). Any added, removed, or
  # changed generated file fails until the manifest is regenerated with
  # scripts/snapshot.py update. Copier is pinned so the hash baseline is stable.
  golden-snapshots:
    name: golden snapshots (content drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: |
          git config --global user.email ci@groundwork.local
          git config --global user.name "groundwork CI"
          git config --global gc.auto 0
      - name: re-render scaffolds and diff against golden manifests
        env:
          COPIER_CMD: uvx copier@9.16.0
        run: python3 scripts/snapshot.py check
      - name: assert generated CI installs where each scaffold's lockfile lives
        env:
          COPIER_CMD: uvx copier@9.16.0
        run: python3 scripts/check_generated_ci.py

  # Option-combination matrix: render representative NON-default toggle combos
  # (not just --defaults) and assert the gated surfaces track the toggles, so a
  # template bug on an untested option path is caught before a user hits it.
  option-matrix:
    name: options (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-no-supabase
            ptype: web
            data: --data use_supabase=false
            supabase: "no"
            modal: "skip"
          - name: web-modal
            ptype: web
            data: --data use_modal=true
            supabase: "yes"
            modal: "yes"
          - name: web-no-ui
            ptype: web
            data: --data has_ui=false
            supabase: "yes"
            modal: "no"
          - name: web-single-env
            ptype: web
            data: --data include_two_env_discipline=false
            supabase: "yes"
            modal: "no"
          - name: web-minimal
            ptype: web
            data: --data use_supabase=false --data use_modal=false --data has_ui=false --data include_two_env_discipline=false --data use_vercel=false
            supabase: "no"
            modal: "no"
          - name: desktop-no-supabase
            ptype: desktop
            data: --data use_supabase=false
            supabase: "no"
            modal: "skip"
          - name: mobile-marketing
            ptype: mobile
            data: --data target_web=false --data marketing_site=true
            supabase: "yes"
            modal: "skip"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: git config --global user.email ci@groundwork.local && git config --global user.name "groundwork CI"
      - name: render combo and assert toggle gating
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          uvx copier copy --defaults --trust --skip-tasks --vcs-ref HEAD \
            --data project_type=${{ matrix.ptype }} --data project_name="OM" \
            ${{ matrix.data }} . "$out"
          test -f "$out/AGENTS.md" || { echo "AGENTS.md missing"; exit 1; }
          test -f "$out/docs/GATES.md" || { echo "GATES.md missing"; exit 1; }
          case "${{ matrix.supabase }}" in
            yes) test -d "$out/supabase"  || { echo "FAIL: supabase/ expected present"; exit 1; } ;;
            no)  test ! -d "$out/supabase" || { echo "FAIL: supabase/ should be absent"; exit 1; } ;;
          esac
          case "${{ matrix.modal }}" in
            yes) test -d "$out/${{ matrix.ptype }}/lib/modal"  || { echo "FAIL: lib/modal expected present"; exit 1; } ;;
            no)  test ! -d "$out/${{ matrix.ptype }}/lib/modal" || { echo "FAIL: lib/modal should be absent"; exit 1; } ;;
          esac
          echo "combo ${{ matrix.name }} OK"
